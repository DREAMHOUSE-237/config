server.port=8080
# Eureka (local)
eureka.client.service-url.defaultZone=http://ec2-16-170-212-130.eu-north-1.compute.amazonaws.com:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=false
eureka.instance.hostname=ec2-16-170-212-130.eu-north-1.compute.amazonaws.com
eureka.instance.instance-id=proxy-service:8080

# ⚠️ DÉSACTIVER la découverte automatique (elle ne fonctionne pas)
spring.cloud.gateway.discovery.locator.enabled=false

# Load balancer
spring.cloud.loadbalancer.strategy=round-robin

# Enable actuator endpoints if needed
management.endpoints.web.exposure.include=*

# ============================
# ROUTES MANUELLES CORRECTES
# ============================

# ---- AUTHENTIFICATION SERVICE ----
#spring.cloud.gateway.routes[0].id=authentification
#spring.cloud.gateway.routes[0].uri=lb://authentification
#spring.cloud.gateway.routes[0].predicates[0]=Path=/AUTHENTIFICATION/**
#spring.cloud.gateway.routes[0].filters[0]=RewritePath=/AUTHENTIFICATION/(?<segment>.*), /$\{segment}

spring.cloud.gateway.routes[0].id=authentification
spring.cloud.gateway.routes[0].uri=lb://AUTHENTIFICATION
spring.cloud.gateway.routes[0].predicates[0]=Path=/AUTHENTIFICATION/**
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/AUTHENTIFICATION/(?<segment>.*), /api/auth/${segment}

# ---- PROPERTY SERVICE ----
spring.cloud.gateway.routes[1].id=property-service
spring.cloud.gateway.routes[1].uri=lb://property
spring.cloud.gateway.routes[1].predicates[0]=Path=/PROPERTY/**
spring.cloud.gateway.routes[1].filters[0]=RewritePath=/PROPERTY/(?<segment>.*), /$\{segment}

# ---- DREAMHOUSE SERVICE (BIENS) ----
spring.cloud.gateway.routes[2].id=dreamhouse
spring.cloud.gateway.routes[2].uri=lb://dreamhouse
spring.cloud.gateway.routes[2].predicates[0]=Path=/DREAMHOUSE/**
spring.cloud.gateway.routes[2].filters[0]=RewritePath=/DREAMHOUSE/(?<segment>.*), /$\{segment}

# ---- DREAMHOUSE SERVICE (BIENS) ----
spring.cloud.gateway.routes[3].id=user-service
spring.cloud.gateway.routes[3].uri=lb://user-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/USER-SERVICE/**
spring.cloud.gateway.routes[3].filters[0]=RewritePath=/USER-SERVICE/(?<segment>.*), /$\{segment}

# LOGGING
logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.org.springframework.web.cors=DEBUG
logging.level.com.dreamhouse237=DEBUG

# CORS Configuration for Gateway
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-origins=https://dreamhouse237.onrender.com,http://localhost:5173
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-methods=GET,POST,PUT,DELETE,OPTIONS
spring.cloud.gateway.globalcors.cors-configurations.[/**].allowed-headers=*
spring.cloud.gateway.globalcors.cors-configurations.[/**].allow-credentials=true
