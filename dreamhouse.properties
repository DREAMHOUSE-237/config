server.port=8089

# Eureka
eureka.client.service-url.defaultZone=http://192.168.172.81:8761/eureka
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

# Pour éviter les conflits avec les ressources statiques
spring.web.resources.add-mappings=false
spring.mvc.throw-exception-if-no-handler-found=true

# Base de données (si vous utilisez JPA)
spring.datasource.url=jdbc:mysql://localhost:3306/publication
spring.datasource.username=root
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

