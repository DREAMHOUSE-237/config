# ===================
# Server config
# ===================
server.port=8001
spring.application.name=user-service

# ===================
# Eureka config
# ===================
eureka.client.service-url.defaultZone=http://192.168.172.81:8761/eureka/
eureka.instance.prefer-ip-address=true
# Dynamically pick the IP of the machine
eureka.instance.ip-address=${HOST_IP:127.0.0.1}
eureka.instance.instance-id=${spring.application.name}:${eureka.instance.ip-address}:${server.port}
eureka.instance.home-page-url=http://${eureka.instance.ip-address}:${server.port}/
eureka.instance.status-page-url=http://${eureka.instance.ip-address}:${server.port}/actuator/health
eureka.instance.health-check-url=http://${eureka.instance.ip-address}:${server.port}/actuator/health

# ===================
# Django config
# ===================
SECRET_KEY=dev-secret-key
DEBUG=True
ALLOWED_HOSTS=127.0.0.1,localhost,${HOST_IP:127.0.0.1}

# ===================
# Database config
# ===================
database.name=userservice_db
database.user=userservice
database.password=user
database.host=localhost
database.port=5432

# ===================
# RabbitMQ config
# ===================
rabbitmq.url=amqp://dreamhouse:dreamhouse@192.168.172.81:5672/%2f